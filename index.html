<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiener Linien Board</title>

<style>
body {
    background: black;
    color: #ff9900;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 50px;
    margin-bottom: 30px;
}

.station {
    font-size: 60px;
    margin-bottom: 20px;
}

.line {
    display: flex;
    justify-content: space-between;
    font-size: 60px;
    padding: 20px 0;
    border-bottom: 2px solid rgba(255,153,0,0.3);
}

.left {
    display: flex;
    gap: 20px;
}

.linename {
    font-weight: bold;
}

.minutes {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <div>Abfahrten</div>
    <div id="clock"></div>
</div>

<div class="station">Hietzing</div>

<div id="board">Lade Daten...</div>

<script>
const RBL = "602009,602010"; // beide Richtungen in EINEM request

async function loadData() {
    try {
        const url = "https://api.allorigins.win/get?url=" +
            encodeURIComponent("https://www.wienerlinien.at/ogd_realtime/monitor?rbl=" + RBL);

        const res = await fetch(url);
        const raw = await res.json();
        const data = JSON.parse(raw.contents);

        let html = "";

        data.data.monitors.forEach(monitor => {
            monitor.lines.forEach(line => {
                const name = line.name;
                const towards = line.towards;

                line.departures.departure.slice(0, 2).forEach(dep => {
                    const time = dep.departureTime.countdown;

                    html += `
                    <div class="line">
                        <div class="left">
                            <div class="linename">${name}</div>
                            <div>→ ${towards}</div>
                        </div>
                        <div class="minutes">${time} min</div>
                    </div>
                    `;
                });
            });
        });

        document.getElementById("board").innerHTML = html || "Keine Daten";

    } catch (e) {
        document.getElementById("board").innerHTML = "Fehler beim Laden";
        console.error(e);
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString("de-AT", {hour: '2-digit', minute:'2-digit'});
}

setInterval(loadData, 15000);
setInterval(updateClock, 1000);

loadData();
updateClock();
</script>

</body>
</html>
