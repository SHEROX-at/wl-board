<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WL Board</title>

<style>
body {
    background: black;
    color: #ff9900;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
}
.header {
    display: flex;
    justify-content: space-between;
    font-size: 50px;
}
.station {
    font-size: 60px;
    margin: 20px 0;
}
.line {
    display: flex;
    justify-content: space-between;
    font-size: 50px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,153,0,0.2);
}
.left {
    display: flex;
    gap: 15px;
}
</style>
</head>

<body>

<div class="header">
    <div>Abfahrten</div>
    <div id="clock"></div>
</div>

<div class="station">Hietzing</div>

<div id="board">Lade Daten...</div>

<script>
const RBL = "602009"; // nur eine Richtung jetzt

function loadData() {
    const script = document.createElement("script");

    script.src = "https://www.wienerlinien.at/ogd_realtime/monitor?rbl=" + RBL + "&callback=handleData";

    document.body.appendChild(script);
}

function handleData(data) {
    let entries = [];

    data.data.monitors.forEach(m => {
        m.lines.forEach(l => {
            l.departures.departure.forEach(d => {

                let display;
                let sort;

                if (d.departureTime.countdown !== undefined) {
                    let c = d.departureTime.countdown;
                    display = c === 0 ? "SOFORT" : c + " min";
                    sort = c;
                } else if (d.departureTime.timePlanned) {
                    const date = new Date(d.departureTime.timePlanned);
                    display = date.toLocaleTimeString("de-AT", {hour:"2-digit", minute:"2-digit"});
                    sort = date.getTime();
                }

                entries.push({
                    name: l.name,
                    towards: l.towards,
                    display,
                    sort
                });
            });
        });
    });

    entries.sort((a,b) => a.sort - b.sort);

    let html = "";
    entries.slice(0,5).forEach(e => {
        html += `
        <div class="line">
            <div class="left">
                <div>${e.name}</div>
                <div>→ ${e.towards}</div>
            </div>
            <div>${e.display}</div>
        </div>`;
    });

    document.getElementById("board").innerHTML = html || "Keine Daten";
}

// Uhr
function updateClock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString("de-AT", {hour:'2-digit', minute:'2-digit'});
}

setInterval(loadData, 15000);
setInterval(updateClock, 1000);

loadData();
updateClock();
</script>

</body>
</html>
