<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>WL Anzeige</title><style>body{margin:0;background:black;color:#ffd300;font-family:"Courier New",monospace}.container{padding:30px}.row{display:flex;justify-content:space-between;font-size:60px;margin-bottom:20px}.left{display:flex;gap:20px}.line{font-weight:bold}.time{width:80px;text-align:right}@keyframes blink{50%{opacity:0}}.blink{animation:blink 1s infinite}</style></head><body><div class="container"><div id="board">Lade...</div></div><script>async function load(){try{const res=await fetch("/api/wl?rbl=602009");const data=await res.json();let entries=[];if(data.data.monitors&&data.data.monitors.length>0){data.data.monitors.forEach(m=>{m.lines.forEach(l=>{l.departures.departure.forEach(d=>{let display,sort;if(d.departureTime.countdown!==undefined){let c=d.departureTime.countdown;display=c===0?"0":c;sort=c}else if(d.departureTime.timePlanned){const date=new Date(d.departureTime.timePlanned);display=date.toLocaleTimeString("de-AT",{hour:"2-digit",minute:"2-digit"});sort=date.getTime()}entries.push({name:l.name,dest:l.towards,display,sort})})})})}else{entries=[{name:"U4",dest:"HÜTTELDORF",display:"00:34"},{name:"U4",dest:"HÜTTELDORF",display:"00:49"},{name:"U4",dest:"HÜTTELDORF",display:"01:04"}]}entries.sort((a,b)=>a.sort-b.sort);let html="";entries.slice(0,3).forEach(e=>{html+=`<div class="row"><div class="left"><div class="line">${e.name}</div><div>${e.dest}</div></div><div class="time ${e.display==="0"?"blink":""}">${e.display}</div></div>`});document.getElementById("board").innerHTML=html}catch(e){document.getElementById("board").innerHTML="FEHLER"}}setInterval(load,15000);load();</script></body></html>
