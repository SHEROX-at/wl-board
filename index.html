<!DOCTYPE html>
<html>
<body style="background:black;color:orange;font-family:Arial">

<h1 id="clock"></h1>
<div id="board">Lade...</div>

<script>
const URL = "https://corsproxy.io/?https://www.wienerlinien.at/ogd_realtime/monitor?rbl=343";

async function load() {
  try {
    const res = await fetch(URL);
    const data = await res.json();

    let html = "";

    data.data.monitors[0].lines.forEach(l => {
      l.departures.departure.slice(0,3).forEach(d => {
        html += `<div>${l.name} → ${l.towards} (${d.departureTime.countdown} min)</div>`;
      });
    });

    document.getElementById("board").innerHTML = html;

  } catch {
    document.getElementById("board").innerHTML = "FEHLER";
  }
}

setInterval(load, 15000);
load();

setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
