<!DOCTYPE html>
<html>
<body style="background:black;color:orange;font-family:Arial">

<h1 id="clock"></h1>
<div id="board"></div>

<script>
function loadFake() {
  const data = [
    {line:"U4", to:"Hütteldorf", time:"SOFORT"},
    {line:"U4", to:"Heiligenstadt", time:"3 min"},
    {line:"U4", to:"Hütteldorf", time:"7 min"}
  ];

  let html = "";
  data.forEach(d=>{
    html += `<div style="font-size:30px">${d.line} → ${d.to} (${d.time})</div>`;
  });

  document.getElementById("board").innerHTML = html;
}

setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

loadFake();
</script>

</body>
</html>
