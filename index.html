<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiener Linien Board</title>

<style>
body {
    background: black;
    color: #ff9900;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 50px;
    margin-bottom: 20px;
}

.station {
    font-size: 60px;
    margin-bottom: 30px;
}

.line {
    display: flex;
    justify-content: space-between;
    font-size: 55px;
    padding: 15px 0;
    border-bottom: 2px solid rgba(255,153,0,0.2);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.4s forwards;
}

.left {
    display: flex;
    gap: 20px;
}

.linename {
    font-weight: bold;
}

.minutes {
    font-weight: bold;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="header">
    <div>Abfahrten</div>
    <div id="clock"></div>
</div>

<div class="station">Hietzing</div>

<div id="board">Lade Daten...</div>

<script>
const RBL = "602009,602010";

async function loadData() {
    try {
        const url = "https://api.allorigins.win/get?url=" +
            encodeURIComponent("https://www.wienerlinien.at/ogd_realtime/monitor?rbl=" + RBL);

        const res = await fetch(url);
        const raw = await res.json();
        const data = JSON.parse(raw.contents);

        let entries = [];

        data.data.monitors.forEach(monitor => {
            monitor.lines.forEach(line => {
                line.departures.departure.forEach(dep => {

                    let display;
                    let sort;

                    if (dep.departureTime.countdown !== undefined) {
                        let c = dep.departureTime.countdown;
                        if (c === 0) {
                            display = "SOFORT";
                            sort = 0;
                        } else {
                            display = c + " min";
                            sort = c;
                        }
                    } else if (dep.departureTime.timePlanned) {
                        const date = new Date(dep.departureTime.timePlanned);
                        display = date.toLocaleTimeString("de-AT", {hour:"2-digit", minute:"2-digit"});
                        sort = date.getTime();
                    }

                    entries.push({
                        name: line.name,
                        towards: line.towards,
                        display,
                        sort
                    });
                });
            });
        });

        entries.sort((a,b) => a.sort - b.sort);

        let html = "";
        entries.slice(0,5).forEach(e => {
            html += `
            <div class="line">
                <div class="left">
                    <div class="linename">${e.name}</div>
                    <div>→ ${e.towards}</div>
                </div>
                <div class="minutes">${e.display}</div>
            </div>`;
        });

        document.getElementById("board").innerHTML = html || "Keine Daten";

    } catch (e) {
        document.getElementById("board").innerHTML = "Fehler beim Laden";
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString("de-AT", {hour:'2-digit', minute:'2-digit'});
}

setInterval(loadData, 15000);
setInterval(updateClock, 1000);

loadData();
updateClock();
</script>

</body>
</html>
