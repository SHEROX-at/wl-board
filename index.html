<!DOCTYPE html>
<html>
<body style="background:black;color:orange;font-family:Arial">

<h1>DEBUG</h1>
<div id="out">start...</div>

<script>
document.getElementById("out").innerText = "script läuft";

fetch("/api/wl")
.then(res => {
  document.getElementById("out").innerText = "api antwortet...";
  return res.text();
})
.then(text => {
  document.getElementById("out").innerText = text;
})
.catch(err => {
  document.getElementById("out").innerText = "FEHLER: " + err;
});
</script>

</body>
</html>
