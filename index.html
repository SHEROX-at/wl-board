<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WL Board</title>

<style>
body {
    background: black;
    color: #ff9900;
    font-family: Arial;
    padding: 30px;
}
.header {
    display: flex;
    justify-content: space-between;
    font-size: 40px;
}
.station {
    font-size: 50px;
    margin: 20px 0;
}
.line {
    display: flex;
    justify-content: space-between;
    font-size: 40px;
    padding: 10px 0;
    border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="header">
    <div>Abfahrten</div>
    <div id="clock"></div>
</div>

<div class="station">Hietzing</div>
<div id="board">Lade Daten...</div>

<script>
const URL = "https://corsproxy.io/?https://www.wienerlinien.at/ogd_realtime/monitor?rbl=602009";

async function load() {
    try {
        const res = await fetch(URL);
        const data = await res.json();

        let html = "";

        const lines = data.data.monitors[0].lines;

        lines.forEach(line => {
            line.departures.departure.slice(0,3).forEach(dep => {
                const c = dep.departureTime.countdown;
                const t = c === 0 ? "SOFORT" : c + " min";

                html += `
                <div class="line">
                    <div>${line.name} → ${line.towards}</div>
                    <div>${t}</div>
                </div>`;
            });
        });

        document.getElementById("board").innerHTML = html;

    } catch {
        document.getElementById("board").innerHTML = "Fehler beim Laden";
    }
}

function clock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString("de-AT",{hour:'2-digit',minute:'2-digit'});
}

setInterval(load, 15000);
setInterval(clock, 1000);

load();
clock();
</script>

</body>
</html>
